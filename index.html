<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CM Tender Radar — ÉLŐ TED-adatok (pilot)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#161513; --panel:#201F1C; --panel2:#2B2A26; --border:#3B3934;
    --text:#EAE8E3; --muted:#939598; --accent:#C0A062; --accent2:#D9BD84;
    --hot:#B0451F; --good:#4E9B7C; --mid:#F4B422; --low:#63615C;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Montserrat','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
  header{display:flex;align-items:center;gap:16px;padding:12px 24px;background:var(--panel);border-bottom:3px solid var(--accent);box-shadow:0 1px 8px rgba(0,0,0,.4);position:sticky;top:0;z-index:20}
  .logo{font-weight:800;font-size:18px;letter-spacing:.5px}
  .logo span{color:var(--accent)}
  .badge{background:var(--accent);color:#fff;border-radius:10px;padding:2px 9px;font-size:12px;font-weight:700}
  nav{display:flex;gap:4px;margin-left:24px}
  nav a{color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:6px;font-weight:600}
  nav a.active,nav a:hover{color:var(--text);background:var(--panel2)}
  .user{margin-left:auto;color:var(--muted);font-size:13px}
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:18px 24px 6px}
  .kpi{background:var(--panel);border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.3);border-radius:10px;padding:14px 16px}
  .kpi .n{font-size:26px;font-weight:800}
  .kpi .l{color:var(--muted);font-size:12px;margin-top:2px}
  .kpi.hot .n{color:var(--hot)} .kpi.good .n{color:var(--good)} .kpi.acc .n{color:var(--accent)}
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;padding:14px 24px;align-items:center}
  input[type=search],select{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;outline:none}
  input[type=search]{flex:1;min-width:220px}
  input:focus,select:focus{border-color:var(--accent)}
  .btn{background:var(--accent);border:none;color:#fff;font-weight:700;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px}
  .btn.sec{background:var(--panel2);border:1px solid var(--border);color:var(--text)}
  table{width:calc(100% - 48px);margin:4px 24px 40px;border-collapse:collapse}
  th{color:var(--muted);text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:10px 10px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
  td{padding:12px 10px;border-bottom:1px solid var(--border);vertical-align:top}
  tr.row:hover{background:#26251F;cursor:pointer}
  .score{display:inline-flex;align-items:center;justify-content:center;min-width:46px;padding:5px 0;border-radius:8px;font-weight:800;font-size:14px;color:#fff}
  .s-hot{background:var(--hot)} .s-good{background:var(--good)} .s-mid{background:var(--mid);color:#2B2A26} .s-low{background:var(--low)}
  .title-cell b{display:block;font-size:14px;margin-bottom:3px}
  .title-cell .sum{color:var(--muted);font-size:12.5px;line-height:1.45;max-width:520px}
  .chips{margin-top:6px;display:flex;flex-wrap:wrap;gap:5px}
.winner{margin-top:5px;font-size:12px;color:var(--good)}
  .chip{background:#263229;color:#8FCBA9;border-radius:20px;padding:2px 9px;font-size:10.5px;font-weight:700;letter-spacing:.3px}
  .chip.alu{background:#35301F;color:#D9BD84}
.chip.fund{border:1px solid rgba(255,255,255,.06)}
.chip.fund-eu{background:#173a2c;color:#5fd0a0}
.chip.fund-pnrr{background:#16323c;color:#5fc6d0}
.chip.fund-state{background:#1e2c46;color:#8fb4ff}
.chip.fund-local{background:#3a2c17;color:#e6b45a}
  .meta{white-space:nowrap;color:var(--muted);font-size:12.5px;line-height:1.6}
  .meta b{color:var(--text)}
  .dl-warn{color:var(--mid);font-weight:700}
  .dl-crit{color:var(--hot);font-weight:700}
  .status{border-radius:6px;padding:4px 9px;font-size:11.5px;font-weight:700;white-space:nowrap;border:1px solid var(--border);background:var(--panel2);color:var(--text)}
  .st-uj{border-color:var(--accent);color:var(--accent)}
  .st-erdekes{border-color:var(--good);color:var(--good)}
  .st-nem{color:var(--low)}
  .st-ajanlat{border-color:#8FA8D9;color:#8FA8D9}
  a.src{color:var(--accent2);text-decoration:none;font-size:12.5px}
  /* detail drawer */
  #drawer{position:fixed;top:0;right:-560px;width:560px;height:100vh;background:var(--panel);border-left:1px solid var(--border);box-shadow:-4px 0 22px rgba(0,0,0,.5);z-index:30;transition:right .25s;overflow-y:auto;padding:24px}
  #drawer.open{right:0}
  #drawer h2{font-size:17px;margin-bottom:6px;line-height:1.35}
  #drawer .sec-t{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px;margin:18px 0 6px}
  #drawer .box{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:13px;line-height:1.55}
  #drawer .close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:4px 10px;font-size:13px;line-height:1.7}
  .kv .k{color:var(--muted)}
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:25;display:none}
  #overlay.on{display:block}
  .note{color:var(--muted);font-size:12px;padding:0 24px 20px}
  select.mini{padding:5px 8px;font-size:12px}
.odSortBtn,.kivSortBtn{background:var(--panel2);border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:6px 11px;font-size:12px;cursor:pointer}
.odSortBtn.on,.kivSortBtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>

function filterOda(qv){
  var hu=L==='hu';
  var nm=function(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');};
  var f=nm(qv);
  var rows=OD.filter(function(o){return !f||nm(o.w+' '+o.c+' '+o.p+' '+o.t).includes(f);});
  if(odRegFilter) rows=rows.filter(function(o){return odRegionInfo(o).region===odRegFilter;});
  if(odSort==='score') rows=rows.slice().sort(function(a,b){return odScore(b)-odScore(a);});
  else if(odSort==='value') rows=rows.slice().sort(function(a,b){return (b.v||0)-(a.v||0);});
  else rows=rows.slice().sort(function(a,b){return (b.d||'').localeCompare(a.d||'');});
  document.getElementById('odaBody').innerHTML = rows.map(function(o){
    var val=o.v?o.v+' M':'—';
    var ri=odRegionInfo(o);
    var regCell = ri.region ? (ri.region + (ri.basis==='hq'?' <span title="'+(hu?'kivitelező székhelye alapján':'după sediul constructorului')+'" style="color:var(--good);font-size:10px">●</span>':'')) : '<span style="color:var(--muted)">—</span>';
    return '<tr><td><span class="score '+sc(odScore(o))+'" style="min-width:34px;padding:3px 0;font-size:12px">'+odScore(o)+'</span></td>'
      +'<td style="white-space:nowrap;color:var(--muted)">'+o.d+'</td>'
      +'<td style="white-space:nowrap;color:var(--muted)">'+val+'</td>'
      +'<td style="white-space:nowrap">'+regCell+'</td>'
      +'<td>'+o.c+'</td>'
      +'<td>'+o.p+'</td>'
      +'<td>'+winnersHtml(o.w)+'</td>'
      +'<td>'+o.t+'</td>'
      +'<td><a class="src" href="'+o.u+'" target="_blank">eredeti ↗</a></td></tr>';
  }).join('');
}

function nmw(s){return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9]+/g,' ').trim();}
function projFor(name){const nk=nmw(name);if(nk.length<4)return [];return OD.filter(o=>o.w&&nmw(o.w).includes(nk));}
function toggleKiv(i){const e=document.getElementById('kivd'+i);if(e)e.style.display=e.style.display==='none'?'table-row':'none';}
function filterKiv(qv){
  var hu=L==='hu';
  var nm=function(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');};
  var f=nm(qv);
  var rows=K.map(function(k,i){return {k:k,i:i};}).filter(function(o){return !f||nm(o.k.name+' '+o.k.county+' '+o.k.types+' '+(o.k.city||'')).includes(f);});
  if(kivRegFilter) rows=rows.filter(function(o){return kRegion(o.k)===kivRegFilter;});
  if(kivSort==='avg') rows=rows.slice().sort(function(a,b){return (kStats(b.k).avg||0)-(kStats(a.k).avg||0);});
  else if(kivSort==='value') rows=rows.slice().sort(function(a,b){return (kStats(b.k).tot||0)-(kStats(a.k).tot||0);});
  else rows=rows.slice().sort(function(a,b){return (b.k.wins||0)-(a.k.wins||0);});
  document.getElementById('kivBody').innerHTML = rows.map(function(o,pos){
    var k=o.k, i=o.i, s=kStats(k);
    var reg=kRegion(k), basis=kRegionBasis(k);
    var regCell=reg?(reg+(basis==='hq'?' <span title="'+(hu?'ismert székhely':'sediu cunoscut')+'" style="color:var(--good);font-size:10px">●</span>':'')):'<span style="color:var(--muted)">—</span>';
    var val=s.tot?s.tot+' M':'—';
    var avgmax=(s.avg!=null)?('<b style="color:'+(s.avg>=60?'var(--good)':'var(--text)')+'">'+s.avg+'</b> / '+s.max):'<span style="color:var(--muted)">—</span>';
    var contact=[k.email?'<a class="src" href="mailto:'+k.email+'">'+k.email+'</a>':'',k.web?'<a class="src" href="'+k.web+'" target="_blank">web</a>':'',k.city?'<span style="color:var(--muted)">'+k.city+'</span>':''].filter(Boolean).join(' · ')||'<span style="color:var(--muted)">—</span>';
    var ps=projFor(k.name);
    var projCell=ps.length?'<a class="src" href="#" onclick="toggleKiv('+i+');return false">'+ps.length+' projekt ▾</a>':(k.u?'<a class="src" href="'+k.u+'" target="_blank">projekt ↗</a>':'<span style="color:var(--muted)">—</span>');
    var expand='<tr id="kivd'+i+'" style="display:none"><td></td><td colspan="9" style="padding:0 12px 12px"><div style="background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:6px 12px">'+(ps.map(function(o2){return '<div style="padding:4px 0;border-bottom:1px solid var(--border);font-size:12px"><span class="score '+sc(odScore(o2))+'" style="min-width:30px;padding:1px 0;font-size:10.5px;margin-right:7px">'+odScore(o2)+'</span><span style="color:var(--muted)">'+o2.d+' · '+(o2.v?o2.v+'M · ':'')+o2.c+' · '+o2.p+'</span> — '+o2.t+' <a class="src" href="'+o2.u+'" target="_blank">eredeti ↗</a></div>';}).join('')||'<span style="color:var(--muted);font-size:12px">—</span>')+'</div></td></tr>';
    return '<tr><td style="color:var(--muted)">'+(pos+1)+'</td><td><b>'+k.name+'</b></td><td style="white-space:nowrap">'+regCell+'</td><td><b>'+k.wins+'</b><span style="color:var(--muted)"> / '+k.solo+'</span></td><td style="text-align:center">'+s.n+'</td><td style="white-space:nowrap">'+avgmax+'</td><td style="color:var(--muted);white-space:nowrap">'+val+'</td><td>'+k.county+'</td><td>'+contact+'</td><td>'+projCell+'</td></tr>'+expand;
  }).join('');
}

function setView(v){
  VIEW=v;
  ['radar','seap','ted','oda','kiv','guide','stat','admin'].forEach(x=>document.getElementById('nav-'+x).classList.toggle('active',x===v));
  const listMode = (v==='radar'||v==='seap'||v==='ted');
  document.querySelector('.toolbar').style.display = listMode?'flex':'none';
  document.querySelector('table').style.display = listMode?'table':'none';
  document.querySelectorAll('.note')[0].style.display = listMode?'block':'none';
  statsPanel.style.display = v==='stat'?'block':'none';
  adminPanel.style.display = v==='admin'?'block':'none';
  kivPanel.style.display = v==='kiv'?'block':'none';
  odaPanel.style.display = v==='oda'?'block':'none';
  guidePanel.style.display = v==='guide'?'block':'none';
  viewNote.style.display = (v==='seap'||v==='ted')?'block':'none';
  if(v==='seap') viewNote.textContent=tr('vnSeap');
  if(v==='ted') viewNote.textContent=tr('vnTed');
  if(v==='ma') viewNote.textContent=tr('vnMa');
  if(v==='oda') viewNote.textContent=tr('vnOda');
  if(v==='stat') renderStats();
  if(v==='admin') renderAdmin();
  if(v==='kiv') renderKiv();
  if(v==='oda') renderOda();
  if(v==='guide') renderGuide();
  if(listMode) view();
}
function bar(label,val,max,color){
  const w=max?Math.round(val/max*100):0;
  return `<div style="display:grid;grid-template-columns:190px 1fr 90px;gap:10px;align-items:center;margin:5px 0;font-size:13px">
    <span style="color:var(--muted)">${label}</span>
    <div style="background:var(--panel2);border-radius:6px;height:18px"><div style="width:${w}%;height:18px;border-radius:6px;background:${color}"></div></div>
    <b>${typeof val==='number'&&val>1e5?new Intl.NumberFormat('hu-HU').format(Math.round(val/1e6))+'M RON':val}</b></div>`;
}
function renderStats(){
  const bands=[['90–100 (HOT)',t=>t.score>=90,'var(--hot)'],['70–89',t=>t.score>=70&&t.score<90,'var(--good)'],['50–69',t=>t.score>=50&&t.score<70,'var(--mid)'],['35–49',t=>t.score>=35&&t.score<50,'var(--low)'],['0–34',t=>t.score<35,'#3a4653']];
  const bmax=Math.max(...bands.map(b=>T.filter(b[1]).length));
  const byC={}; T.forEach(t=>{byC[t.county]=byC[t.county]||{n:0,v:0}; byC[t.county].n++; byC[t.county].v+=(t.value||0);});
  const cRows=Object.entries(byC).sort((a,b)=>b[1].v-a[1].v);
  const cmax=Math.max(...cRows.map(x=>x[1].v));
  const byP={}; T.forEach(t=>(t.prods||[]).forEach(p=>byP[p]=(byP[p]||0)+1));
  const pRows=Object.entries(byP).sort((a,b)=>b[1]-a[1]); const pmax=Math.max(...pRows.map(x=>x[1]),1);
  const totV=T.reduce((a,t)=>a+(t.value||0),0);
  statsPanel.innerHTML = `
   <h2 style="font-size:16px;margin-bottom:14px">${tr('statH')} (${T.length} ${tr('statT')} ${new Intl.NumberFormat('hu-HU').format(Math.round(totV/1e6))}M RON)</h2>
   <div style="display:grid;grid-template-columns:1fr 1fr;gap:28px">
    <div><div class="sec" style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">${tr('statB')}</div>
      ${bands.map(b=>bar(b[0],T.filter(b[1]).length,bmax,b[2])).join('')}
      <div class="sec" style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px;margin:18px 0 8px">${tr('statP')}</div>
      ${pRows.map(p=>bar(p[0],p[1],pmax,'var(--accent)')).join('')}</div>
    <div><div class="sec" style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">${tr('statC')}</div>
      ${cRows.map(c=>bar(c[0]+' ('+c[1].n+' db)',c[1].v,cmax,'var(--accent2)')).join('')}
      </div>
   </div>
   <div class="note" style="padding:16px 0 0">Éles rendszerben itt: heti trendek, forrásonkénti gyűjtési statisztika, konverziós tölcsér (érdekes → megkeresve → ajánlat → nyert), sales-aktivitás.</div>`;
}
function renderAdmin(){
  adminPanel.innerHTML = `
   <h2 style="font-size:16px;margin-bottom:14px">${tr('adminH')}</h2>
   <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    ${Object.entries(KWPKG).map(([k,v])=>`
     <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px">
      <b style="font-size:13px">${k}</b>
      <textarea style="width:100%;margin-top:8px;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px;min-height:86px;font-size:12.5px;outline:none">${v}</textarea>
     </div>`).join('')}
   </div>
   <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:16px;display:flex;gap:28px;align-items:center;flex-wrap:wrap;font-size:13px">
    <span><b>Azonnali alert küszöb:</b> <input type="number" value="70" min="0" max="100" style="width:64px;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px"></span>
    <span><b>Napi digest küszöb:</b> <input type="number" value="50" min="0" max="100" style="width:64px;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px"></span>
    <span><b>AI-elemzés küszöb:</b> <input type="number" value="35" min="0" max="100" style="width:64px;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px"></span>
    <button class="btn" onclick="alert('Pilot-módban a mentés inaktív — éles rendszerben ez a keyword_config táblába ír, és a következő futástól érvényes.')">${tr('save')}</button>
   </div>
   <div class="note" style="padding:16px 0 0">Éles rendszerben itt: felhasználó-kezelés (admin/sales/olvasó), cél-megyék, email-címzettek, forrás-állapot (collector_runs), AI-költségkeret.</div>`;
}

applyLang();
</script>
</body>
</html>
